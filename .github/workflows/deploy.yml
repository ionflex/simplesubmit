name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AZURE_LOCATION: westeurope
  RESOURCE_GROUP: iptyphet-p-we-simsub-rg
  STATIC_WEB_APP: iptyphet-p-we-simsub-stapp

jobs:
  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-if
        run: |
          az deployment sub what-if \
            --location "$AZURE_LOCATION" \
            --template-file infra/main.bicep \
            --name "simsub-${{ github.run_number }}"

      - name: Deploy
        run: |
          az deployment sub create \
            --location "$AZURE_LOCATION" \
            --template-file infra/main.bicep \
            --name "simsub-${{ github.run_number }}"

  app:
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa
        run: |
          token=$(az staticwebapp secrets list \
            --name "$STATIC_WEB_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.apiKey -o tsv)
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          action: upload
          app_location: src/Client
          api_location: src/Api
          output_location: wwwroot
