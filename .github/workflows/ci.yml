name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SimpleSubmit.slnx

      - name: Build
        run: dotnet build SimpleSubmit.slnx -c Release --no-restore

      - name: Validate Bicep
        run: |
          az bicep install
          az bicep build --file infra/main.bicep --stdout > /dev/null
